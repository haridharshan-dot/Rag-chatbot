services:
  mongo:
    image: mongo:7
    container_name: rag-chatbot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: rag-chatbot-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGO_URI=mongodb://mongo:27017/college_rag_chatbot
      - DATA_DIR=/app/data
    ports:
      - "5001:5001"
    depends_on:
      - mongo
    volumes:
      - ./data:/app/data:ro

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5001/api
        VITE_SOCKET_URL: http://localhost:5001
    container_name: rag-chatbot-client
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - server

volumes:
  mongo_data:
